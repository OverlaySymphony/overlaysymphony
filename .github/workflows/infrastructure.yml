name: Infrastructure

env:
  ROLE_ARN: arn:aws:iam::415944325313:role/infrastructure-overlaysymphony
  REGION: us-east-1
  DIRECTORY: ./infrastructure

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout infrastructure actions
        uses: actions/checkout@v6
        with:
          repository: cjb-labs/infrastructure
          token: ${{ secrets.INFRASTRUCTURE_ACTIONS_PAT }}
          path: ./infrastructure/shared

      - name: Debug OIDC token
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo $TOKEN | cut -d'.' -f2 | base64 -d 2>/dev/null | jq .sub

      - uses: ./infrastructure/shared/.github/actions/setup
        with:
          directory: ${{ env.DIRECTORY }}
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      - uses: ./infrastructure/shared/.github/actions/plan
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
        with:
          directory: ${{ env.DIRECTORY }}

      - uses: ./infrastructure/shared/.github/actions/apply
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
        with:
          directory: ${{ env.DIRECTORY }}
