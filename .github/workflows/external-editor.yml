name: "External: Editor"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/external-editor.yml
      - internal/tooling/**
      - external/editor/**

env:
  WORKSPACE: "editor"
  DIRECTORY: external/editor

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Verify
        uses: ./.github/actions/verify

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Test
        uses: ./.github/actions/test

  build:
    name: Build
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && 'github-pages' || null  }}
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        uses: ./.github/actions/build
        with:
          args: --base=./
