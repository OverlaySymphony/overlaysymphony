name: "Build"
description: ""

inputs:
  artifact-name:
    description: ""
    required: false
  command:
    description: ""
    required: false
    default: "build"
  args:
    description: ""
    required: false
    default: ""

runs:
  using: composite

  steps:
    - name: Build
      shell: bash
      run: npx nx run ${{ env.WORKSPACE }}:${{ inputs.command }} -- ${{ inputs.args }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name || 'build'  }}
        path: ${{ env.DIRECTORY }}/dist
