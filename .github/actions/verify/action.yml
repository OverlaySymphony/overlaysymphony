name: "Verify"
description: ""

inputs:
  skip-typecheck:
    description: "Skip `lint-typecheck`?"
    default: ""
  skip-eslint:
    description: "Skip `lint-eslint`?"
    default: ""
  skip-prettier:
    description: "Skip `lint-prettier`?"
    default: ""
  skip-knip:
    description: "Skip `lint-knip`?"
    default: ""

runs:
  using: composite

  steps:
    - name: Prelint
      shell: bash
      run: pnpm run --filter ${{ env.WORKSPACE }} --if-present prelint

    - name: Typecheck
      if: ${{ !inputs.skip-typecheck }}
      shell: bash
      run: npx nx run ${{ env.WORKSPACE }}:lint-typecheck

    - name: ESLint
      if: ${{ !inputs.skip-eslint }}
      shell: bash
      run: npx nx run ${{ env.WORKSPACE }}:lint-eslint

    - name: Prettier
      if: ${{ !inputs.skip-prettier }}
      shell: bash
      run: npx nx run ${{ env.WORKSPACE }}:lint-prettier

    - name: Knip
      if: ${{ !inputs.skip-knip }}
      shell: bash
      run: npx nx run ${{ env.WORKSPACE }}:lint-knip
